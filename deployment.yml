apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      apptype: backend
      environment: qa
  template:
    metadata:
      labels:
        apptype: backend
        environment: qa
    spec:
      containers:
      - name: nginx
        image: nginx:1.16.1
        ports:
        - containerPort: 80

#annotate the deployment with the change cause
kubectl annotate deployment/frontend-deployment kubernetes.io/change-cause="version 1.14.2 of nginx image"

#check the rollout history of the deployment
kubectl rollout history deployment/frontend-deployment

#rollback to the previous revision
kubectl rollout undo deployment/frontend-deployment --to-revision=2
